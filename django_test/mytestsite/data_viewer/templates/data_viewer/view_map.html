<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Map Viewer | Camiones</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >

  <style>
    :root {
      --bg: #edf3f4;
      --ink: #1d2a30;
      --accent: #146c94;
      --line: #cad8dd;
      --panel: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 0% 0%, #d9ebf3 0, transparent 35%),
        radial-gradient(circle at 100% 0%, #dff2e9 0, transparent 35%),
        var(--bg);
    }

    .wrap {
      max-width: 1250px;
      margin: 0 auto;
      padding: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .title {
      margin: 0;
      font-size: 1.5rem;
    }

    .meta {
      margin: 4px 0 0;
      color: #5e7177;
      font-size: 0.92rem;
    }

    .link-btn {
      text-decoration: none;
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
    }

    .stats {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 0.92rem;
      color: #4f666f;
    }

    #map {
      width: 100%;
      height: 76vh;
      border-radius: 14px;
      border: 1px solid var(--line);
      box-shadow: 0 14px 35px rgba(15, 70, 90, 0.15);
      background: #f2f6f8;
    }

    .popup {
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .popup strong {
      color: #19313a;
    }
  </style>
</head>

<body>
<main class="wrap">

  <section class="topbar">
    <div>
      <h1 class="title">Mapa de Camiones</h1>
      <p class="meta">Última posición por camión y punto de entrega</p>
    </div>
    <a class="link-btn" href="/data_viewer/view_data/">Ver Tabla</a>
  </section>

  <div class="stats" id="stats">Cargando mapa...</div>
  <div id="map"></div>

</main>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<script>
  const map = L.map('map').setView([-34.60, -58.43], 11);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const markersLayer = L.layerGroup().addTo(map);

  // Color por peso
  function colorByWeight(weight) {
    if (weight > 12500) return '#9f1239';
    if (weight > 11000) return '#b45309';
    if (weight > 9500)  return '#1d4ed8';
    return '#0f766e';
  }

  // Calcular distancia entre dos puntos (Haversine simplificado)
  function distance(lat1, lon1, lat2, lon2) {
    const dLat = (lat2 - lat1);
    const dLon = (lon2 - lon1);
    return Math.sqrt(dLat * dLat + dLon * dLon);
  }

  // Agregar bin (centro grande)
  function addBinMarker(bin) {
    const marker = L.circleMarker([bin.lat, bin.lon], {
      radius: 12,
      color: '#166534',
      fillColor: '#22c55e',
      fillOpacity: 0.8,
      weight: 2,
    });

    marker.bindPopup(`
      <div class="popup">
        <strong>${bin.bin_id}</strong><br>
        📍 Punto de entrega<br>
        Lat/Lon: ${Number(bin.lat).toFixed(6)}, ${Number(bin.lon).toFixed(6)}
      </div>
    `);

    markersLayer.addLayer(marker);
  }

  // Agregar camión alrededor del bin
  function addTruckMarker(truck, bin, index, totalTrucks) {
    const radius = 0.0008; // ~80-100 metros
    const step = (2 * Math.PI) / Math.max(totalTrucks, 1);
    const angle = index * step;

    const lat = bin.lat + radius * Math.cos(angle);
    const lon = bin.lon + radius * Math.sin(angle);

    const color = colorByWeight(truck.gross_weight_kg);

    // Usar L.marker con icono personalizado (camión emoji)
    const marker = L.marker([lat, lon], {
      icon: L.divIcon({
        className: 'truck-marker',
        html: `<div style="font-size:20px; text-align:center; color:${color};">🚛</div>`,
        iconSize: [24, 24],
        iconAnchor: [12, 12],
      })
    });

    marker.bindPopup(`
      <div class="popup">
        <strong>🚛 ${truck.truck_id}</strong><br>
        Tipo: ${truck.event_type}<br>
        Peso bruto: ${Number(truck.gross_weight_kg).toFixed(2)} kg<br>
        Carga: ${truck.payload_kg == null ? '-' : Number(truck.payload_kg).toFixed(0)} kg<br>
        Lat/Lon: ${Number(truck.lat).toFixed(6)}, ${Number(truck.lon).toFixed(6)}<br>
        Timestamp: ${truck.event_ts}
      </div>
    `);

    markersLayer.addLayer(marker);
  }

  async function loadMap() {
    const res = await fetch('/data_viewer/api/map/');
    if (!res.ok) throw new Error('Error cargando datos');
    return res.json();
  }

  loadMap()
    .then(data => {
      const trucks = data.markers || [];
      const bins = data.bins || [];

      document.getElementById('stats').textContent =
        `Camiones activos: ${data.trucks_count} | Puntos de entrega: ${data.bins_count}`;

      // Agrupar camiones por su bin más cercano
      const trucksByBin = {};
      bins.forEach((bin, idx) => {
        trucksByBin[idx] = [];
      });

      trucks.forEach(truck => {
        if (bins.length === 0) return;
        
        let closestBinIdx = 0;
        let minDist = Infinity;

        bins.forEach((bin, idx) => {
          const d = distance(truck.lat, truck.lon, bin.lat, bin.lon);
          if (d < minDist) {
            minDist = d;
            closestBinIdx = idx;
          }
        });

        trucksByBin[closestBinIdx].push(truck);
      });

      const bounds = [];

      // Dibujar bins y sus camiones asociados
      bins.forEach((bin, binIdx) => {
        addBinMarker(bin);
        bounds.push([bin.lat, bin.lon]);

        const relatedTrucks = trucksByBin[binIdx] || [];
        relatedTrucks.forEach((truck, truckIdx) => {
          addTruckMarker(truck, bin, truckIdx, relatedTrucks.length);
        });
      });

      // Si no hay bins, mostrar todos los camiones en sus posiciones reales
      if (bins.length === 0) {
        trucks.forEach(truck => {
          const color = colorByWeight(truck.gross_weight_kg);
          const marker = L.circleMarker([truck.lat, truck.lon], {
            radius: 7,
            color: color,
            fillColor: color,
            fillOpacity: 0.85,
            weight: 1,
          });

          marker.bindPopup(`
            <div class="popup">
              <strong>${truck.truck_id}</strong><br>
              Tipo: ${truck.event_type}<br>
              Peso bruto: ${Number(truck.gross_weight_kg).toFixed(2)} kg<br>
              Carga: ${truck.payload_kg == null ? '-' : Number(truck.payload_kg).toFixed(0)} kg<br>
              Lat/Lon: ${Number(truck.lat).toFixed(6)}, ${Number(truck.lon).toFixed(6)}<br>
              Timestamp: ${truck.event_ts}
            </div>
          `);

          markersLayer.addLayer(marker);
          bounds.push([truck.lat, truck.lon]);
        });
      }

      if (bounds.length) {
        map.fitBounds(bounds, { padding: [30, 30] });
      }
    })
    .catch(err => {
      document.getElementById('stats').textContent = err.message;
    });
</script>

</body>
</html>
